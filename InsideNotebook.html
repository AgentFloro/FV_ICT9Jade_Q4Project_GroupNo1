<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Notebooks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

a, h2, p, option, input{font-family: Questrial, sans;}
.logo{width: 140px;height: 140px;margin-top: 80px; margin-bottom: 40px;}
#log{width: 30px;height: 30px;}
#yes{box-shadow: 0 0 10px 5px rgba(27, 27, 27, 0.5);transition: box-shadow 0.5s;transition: transform 0.6s ease;}
#yes:hover{box-shadow: 0 0 10px 5px rgba(77, 151, 255, 0.5);transform: translateY(-10px);}
#header{color: rgb(16, 0, 121);text-align: center;font-family: Funnel Display, sans;text-align: left;}

body{
  background:#e6e6e6;
  font-family: Arial, sans-serif;
}

.sidebar{
  width:150px;
  background:#001353;
  position:fixed;
  height:100%;
  padding-top:10px;
}
.sidebar a{
  color:white;
  display:block;
  padding:14px;
  text-decoration:none;
}
.sidebar a:hover{background:#00042c;}
.sidebar .active{background:#045faa;}

.logo{
  width:120px;
  margin:70px auto 30px;
  display:block;
}

.main{
  margin-left:300px;
  margin-right:200px;
  padding:25px;
}

.header{
  background:#737373;
  color:white;
  padding:35px;
  margin-left:150px;
  margin-bottom:50px;
  margin-top:0px;
}

.box{
  background:white;
  padding:18px;
  border-radius:6px;
  margin-bottom:15px;
}

small{color:#666;}
</style>
</head>

<body>

<div class="sidebar">
  <img src="https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/8b5611eb-ff3a-407f-9adc-e116a23373fc/OBMC+LOGO+2024-04.png" class="logo">
  <a href="#">Dashboard</a>
  <a href="#" class="active">Virtual Notebook</a>
  <a href="#">Tasks</a>
  <a href="#">Profile</a>
  <a href="#">Logout</a>
</div>

<div class="header">
    <h2>Lorem Ipsum Title</h2>
</div>

<div class="main">

  <div class="row">

    <div class="col-md-8">

      <div class="box">
        <h6>Sir Santos</h6>
        <small>from next week ago</small>

        <p style="margin-top:10px;"><b>ICT GRADE</b></p>

        <p>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        </p>

        <form onsubmit="return checkFile()">
          <input type="file" id="fileInput">
          <br><br>
          <button type="submit">Submit File</button>
        </form>

      </div>

    </div>

    <div class="col-md-4">

      <div class="box text-center">
        <h6>Class Activity</h6>

        <div style="background:green; color:white; padding:10px; border-radius:5px;">
          ICT<br><br>
          Project due on May 4
        </div>

      </div>

    </div>

  </div>

</div>

<script>
function checkFile() {
  var file = document.getElementById("fileInput").value;

  if (file == "") {
    window.alert("No file selected");
    return false;
  } 
  else if (file != "") {
    window.alert("File submitted");
    return false;
  } 
  else {
    window.alert("Error");
    return false;
  }
}
</script>

</body>
</html>
