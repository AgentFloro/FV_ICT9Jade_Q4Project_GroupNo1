<script>
function checkFile() {
  var file = document.getElementById("fileInput").value;

  if (file == "") {
    window.alert("No file selected");
    return false;
  } 
  else if (file != "") {
    window.alert("File submitted");
    return false;
  } 
  else {
    window.alert("Error");
    return false;
  }
}
</script>
