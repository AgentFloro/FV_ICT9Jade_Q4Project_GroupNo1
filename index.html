<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Questrial' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Funnel Display';
            background-color: rgb(248, 251, 254);
            background-image: url('https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/676bd718-88f6-489b-957e-b5633d7e52d1/DSC06837.jpg');
            
         }
         
         #Eimee:hover{
            box-shadow: 0 0 3px 3px rgb(255, 255, 255);
            
            
         }
        #Eimee {
            opacity: 0.;
            background: url("https://wallpaper-house.com/data/out/5/wallpaper2you_47036.jpg");
            background-size: cover;
            border-radius: 25px;
            height: auto;
            width: 475px;
            margin: 120px auto;
            text-align: center;
            padding: 20px;
            color: rgb(255, 255, 255);
            font-weight: bold;
            transition: box-shadow 0.5s;
        }
        .footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  background-color: #2e2e2e;
  opacity: 0.7;
  color: white;
  text-align: center;
}
.footer p {
    text-align: center;
    margin-bottom: 0; /* Optional: cleans up extra spacing at the bottom */
}
    </style>
</head>
<body>
    <div id="Eimee" class="form-check form-switch">
        <br>
        <h1><b>Log In</b></h1>
        <br>
        <form id="loginForm">
            <label for="Name">Username:</label>
            <input type="text" id="Name" placeholder="Input Username..." class="form-control">
            <br>
            <label for="Passy">Password:</label>
            <input type="password" id="Passy" placeholder="Input Password..." class="form-control">
            <br><br>
            
            
            <input type="checkbox" id="apple" class="form-check-input" onclick="toggleYummy()" style="margin-left: 120px;">
            <label for="apple" class="form-check-label" style="margin-right: 120px;">Remember my info</label>
            
            
            <p id="M" style="color: rgb(119, 167, 255); height: 30px;"></p>
            
            <button type="button" class="btn btn-outline-warning" id="A" onclick="Kurt()">Login</button>
            <button type="reset" class="btn btn-outline-warning" >Clear All</button>
            
        </form>
        <br>
    </div>
    <div class="footer">
    <br>
    <p>Kurt Abellar, Alexander Floro, Darvine Mitchell, Jeremiah Velasco</p>
    <p>Grade 9-Jade SY: 2025-2026</p>
</div>

    <script>
      


let attempt_counter = 0;

function Kurt(){

let username = document.getElementById("Name").value;
let password = document.getElementById("Passy").value;

do {
        if(!username || !password){
            alert('Please fill out the login form before you proceed.');
            return false;
        }

        if (username === "Darvine" && password === "DarvineCoolBoy") {
            alert("Yes lets go u win");
            attempt_counter = 0; 
            document.getElementById("M").innerHTML = "";
            window.location.href = "dashboard.html"; 
            break;
        } else {
            attempt_counter++;
            document.getElementById("M").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
        }

    } while (false); 

    if (attempt_counter >= 3) {
        alert("locked haha");
        document.getElementById("A").disabled = true; 
    }
}
        
        function toggleYummy() {
            let isChecked = document.getElementById("apple").checked;
            let displayElement = document.getElementById("M");

            if (isChecked) {
                displayElement.innerHTML = "Darvine noted your password and username <3";
            } else {
                displayElement.innerHTML = "";
            }
        }

   
    </script>
</body>
</html>
