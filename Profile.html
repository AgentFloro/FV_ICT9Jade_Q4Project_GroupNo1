<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <link href='https://fonts.googleapis.com/css?family=Questrial' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Funnel Display';font-size: 22px;
            background-color: rgb(248, 251, 254);
            background-image: url('https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/676bd718-88f6-489b-957e-b5633d7e52d1/DSC06837.jpg');
         }

         .btn:hover{
            width: 110px;
            height: 60px;
            background-color: rgba(7, 114, 50);
         }

         .Eimee:hover{
            width: 600px;
            height: 700px;
            background-color: rgba(171, 234, 211, 0.9);
         }

        .Eimee {
            opacity: 0.; 
            background-color: rgb(200, 249, 220, 0.8);
            border-radius: 25px;
            height: 650px;
            width: 500px;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
            color: rgb(23, 23, 23);
            font-weight: bold;
            font-size: 25px;
            transition: width 0.5s, height 0.5s, background-color 0.5s ease-out;
        }

        .btn{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            
            margin-left: auto;
            margin-right: auto;
            width: 100px;
            height: 50px;
            color: rgb(245, 248, 255);
            background-color: rgb(65, 162, 122);
            font-size: 20px;
            font-weight: bold;
            transition: width 0.5s, height 0.5s, background-color 0.5s ease-out;
            border-radius: 5px;
        }

        input { padding: 10px; font-size: 18px; text-align: center; border-radius: 5px; border: 1px solid #fff3f3; }

        .gandingan{
            height: 100px;
            width: 100px;
            border: 100px;
            border-width: 20px;
            border-radius: 90px;
            border-color: black;
        }
    </style>
</head>

<body>
    <div class="Eimee" >
        <h1>Profile</h1>
        <p> Darvine </p>
        <canvas id="Kurts" class="gandingan"></canvas>
        <br>
        
        <label for="imageLoader" class="btn">Upload</label>
        <input type="file" id="imageLoader" name="imageLoader" style="display: none;"/>

        <h5>Gender: Male</h5>
        <h3>Age: 15</h3>
        <h3>Birthday: March 3 2011</h3>
        <h3>Height: 7,8ft</h3>
    </div>

    <script>
        var imageLoader = document.getElementById('imageLoader');
        imageLoader.addEventListener('change', handleImage, false);
        var canvas = document.getElementById('Kurts');
        var ctx = canvas.getContext('2d');

        function handleImage(e){
            var reader = new FileReader();
            reader.onload = function(event){
                var img = new Image();
                img.onload = function(){
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img,0,0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
