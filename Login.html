<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <link href='https://fonts.googleapis.com/css?family=Questrial' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Funnel Display';font-size: 22px;
            background-color: rgb(248, 251, 254);
            background-image: url('https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/676bd718-88f6-489b-957e-b5633d7e52d1/DSC06837.jpg');
            
         }
         .btn:hover{
            width: 110px;
            height: 60px;
            background-color: rgba(7, 114, 50);
         }
         .Eimee:hover{
            width: 600px;
            height: 700px;
            background-color: rgba(171, 234, 211, 0.9);
            
            
         }
        .Eimee {
            
            opacity: 0.;
            background-color: rgb(200, 249, 220, 0.8);
            border-radius: 25px;
            height: 600px;
            width: 550px;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
            color: rgb(23, 23, 23);
            font-weight: bold;
            font-size: 25px;
            transition: width 0.5s, height 0.5s, background-color 0.5s ease-out;
        }
        input { padding: 10px; font-size: 18px; text-align: center; border-radius: 5px; border: 1px solid #fff3f3; }
        .btn{
            width: 100px;
            height: 50px;
            color: rgb(245, 248, 255);
            background-color: rgb(65, 162, 122);
            font-size: 20px;
            font-weight: bold;
            transition: width 0.5s, height 0.5s, background-color 0.5s ease-out;
        }

    </style>
</head>
<body>
    <div class="Eimee" >
        <div>
        <h1>Log in</h1>
        <form id="loginForm">
            <p>Username</p>
            <input type="text" id="Name" class="">
            <p>Password</p>
            <input type="password" id="Passy">
            <br><br>
            
            <input type="checkbox" id="apple" onclick="toggleYummy()">
            <label for="apple">Remember my info</label>
            
            <p id="M" style="color: rgb(88, 181, 88); font-size: 20px; height: 30px;"></p>
            
            <button type="button" class="btn btn-success" id="A" onclick="Kurt()">Login</button>
            <button type="reset" class="btn btn-success" >Clear all</button>
        </form>
        </div>
    </div>

    <script>
      

        // start with function
let attempt_counter = 0;

function Kurt(){

let username = document.getElementById("Name").value;
let password = document.getElementById("Passy").value;

do {
        
        if (username === "Darvine" && password === "DarvineCoolBoy") {
            alert("Yes lets go u win");
            attempt_counter = 0; 
            document.getElementById("M").innerHTML = "";
            window.location.href = "gummybear.html"; //go to second page
            break; // stop loop
        } else {
            attempt_counter++;
            document.getElementById("M").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
        }

    } while (false); 

    if (attempt_counter >= 3) {
        alert("locked haha");
        document.getElementById("M").disabled = true; // lock button
    }
}

  
        
        function toggleYummy() {
            let isChecked = document.getElementById("apple").checked;
            let displayElement = document.getElementById("M");

            if (isChecked) {
                displayElement.innerHTML = "Darvine noted your password and username <3";
            } else {
                displayElement.innerHTML = "";
            }
        }

   
    </script>
</body>
</html>
