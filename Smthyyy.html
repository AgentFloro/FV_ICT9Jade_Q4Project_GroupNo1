<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Online Classes</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f6f8;
}

.header {
  text-align: center;
  padding: 20px;
  background: white;
  font-weight: bold;
  color: #3a6ea5;
}

.container {
  padding: 30px;
}



.input, .dropdown {
  padding: 10px;
  background: #e6e7ea;
  border: none;
  border-radius: 5px;
  width: 200px;
}



.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.subject {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  padding: 30px;
  height: 300px
}

Ict {
  height: 120px;
  background: (45deg, #4cc, #36c);
}

Science {
  background: (45deg, #4c4, #2a6);
}

Mathematics {
  background: (45deg, #224, #933);
}

English {
  background: (45deg, #f55, #f90);
} 
</style>
</head>
<body>

<h1>Online Classes</h1>

<br><br>

  <div>This is the list of your classes</div>

  <div class="top-bar">
    <input class="input" value="2025-2026">
    <input class="input" placeholder="Search class name or professor name">
    <select class="dropdown">
      <option>Sort by</option>
        <option>Alphabetical A-Z</option>
          <option>Alphabetical Z-A</option>
    </select>
   
  </div>

  <br><br>

  <div class="grid">
    
    <div class="subject">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="title">ICT 9-JADE AY 25 26</div>
        <div class="meta">2025-2026</div>
        <div class="teacher">RENN SANTOS</div>
      </div>
    </div>

    <div class="subject">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="title">SCIENCE 9-Jade AY 2526</div>
        <div class="meta">2025-2026</div>
        <div class="teacher">MA. JILLIAN TALAVERA</div>
      </div>
    </div>

    <div class="subject">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="title">MATHEMATICS 9-JADE AY 2526</div>
        <div class="meta">2025-2026</div>
        <div class="teacher">Jill Manny Ramos</div>
      </div>
    </div>

    <div class="subject">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="title">ENGLISH 9-Jade AY2526</div>
        <div class="meta">2025-2026</div>
        <div class="teacher">KRISTIN JOY AVILA</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
